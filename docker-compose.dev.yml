services:
  smtp-gateway:
    build:
      context: ./smtp-gateway
    container_name: test-system-redirect-mail-exparta-smtp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "2525:2525"
    environment:
      SMTP_HOST: 0.0.0.0
      SMTP_PORT: 2525
      INBOUND_URL: http://host.docker.internal:3000/api/inbound/mail
      INBOUND_SECRET: change-me
      REQUEST_TIMEOUT_SEC: 10
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/test-system-redirect-mail-exparta
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16
    container_name: test-system-redirect-mail-exparta-db
    restart: unless-stopped
    ports:
      - 5788:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test-system-redirect-mail-exparta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test-system-redirect-mail-exparta"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: